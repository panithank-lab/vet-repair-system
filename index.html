<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแจ้งซ่อม — คณะสัตวแพทยศาสตร์ ม.อ.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surf:#fff;--surf2:#f0efe9;--surf3:#e8e6de;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --tx:#111110;--tx2:#5a5955;--tx3:#999891;
  --blue:#185fa5;--blue-bg:#e6f1fb;--blue-tx:#0c447c;
  --green:#3b6d11;--green-bg:#eaf3de;--green-tx:#27500a;
  --amber:#854f0b;--amber-bg:#faeeda;--amber-tx:#633806;
  --red:#a32d2d;--red-bg:#fcebeb;--red-tx:#791f1f;
  --purple:#534ab7;--purple-bg:#eeedfe;--purple-tx:#3c3489;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-tx:#085041;
  --r:8px;--rl:12px;
  --font:'IBM Plex Sans Thai','Sarabun',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.55;min-height:100vh}

/* NAV */
.nav{background:#0f1a2e;color:#fff;display:flex;align-items:center;height:54px;padding:0 1.25rem;gap:4px;position:sticky;top:0;z-index:100;box-shadow:0 1px 12px rgba(0,0,0,0.3)}
.nav-logo{font-weight:700;font-size:14px;color:#fff;padding-right:14px;border-right:1px solid rgba(255,255,255,0.12);margin-right:8px;white-space:nowrap;flex-shrink:0;line-height:1.3}
.nav-logo small{color:#7ecbb4;font-size:10px;font-weight:400;display:block}
.ntab{padding:6px 13px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.5);cursor:pointer;border-radius:6px;border:none;background:transparent;font-family:var(--font);white-space:nowrap;transition:all .15s;flex-shrink:0}
.ntab:hover{color:#fff;background:rgba(255,255,255,0.08)}
.ntab.on{color:#fff;background:rgba(255,255,255,0.13)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ubadge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.ua{background:rgba(126,203,180,0.25);color:#7ecbb4}
.ut{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75)}
.nbtn{font-size:12px;padding:5px 13px;border-radius:6px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.65);cursor:pointer;font-family:var(--font);transition:all .15s}
.nbtn:hover{background:rgba(255,255,255,0.1);color:#fff}

/* LAYOUT */
.pg{padding:1.25rem;max-width:1100px;margin:0 auto;width:100%}

/* CARDS */
.card{background:var(--surf);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem}
.card-sm{padding:.9rem}
.ctitle{font-size:14px;font-weight:600;margin-bottom:1rem}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}

/* STAT */
.stat{background:var(--surf2);border-radius:var(--r);padding:.875rem 1rem}
.stat-lbl{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-n{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:3px}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue-tx)}
.b-green{background:var(--green-bg);color:var(--green-tx)}
.b-amber{background:var(--amber-bg);color:var(--amber-tx)}
.b-red{background:var(--red-bg);color:var(--red-tx)}
.b-purple{background:var(--purple-bg);color:var(--purple-tx)}
.b-teal{background:var(--teal-bg);color:var(--teal-tx)}
.b-gray{background:var(--surf2);color:var(--tx2)}

/* BUTTONS */
.btn{font-family:var(--font);font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--r);border:.5px solid var(--bd2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--tx2)}
.btn:hover{background:var(--surf2)}.btn:active{transform:scale(.98)}
.btn-p{background:#0f1a2e;color:#fff;border-color:#0f1a2e}.btn-p:hover{background:#1a2d4a;color:#fff}
.btn-green{background:var(--green-bg);color:var(--green-tx);border-color:rgba(59,109,17,.3)}.btn-green:hover{background:#c0dd97}
.btn-red{background:var(--red-bg);color:var(--red-tx);border-color:rgba(163,45,45,.3)}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:6px}

/* FORM */
label{font-size:12px;font-weight:500;color:var(--tx2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;font-family:var(--font);font-size:13px;color:var(--tx);background:var(--surf);border:.5px solid var(--bd2);border-radius:var(--r);padding:7px 11px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:.875rem}
.ff{margin-bottom:.875rem}

/* CHECKBOX MULTI-SELECT */
.checkbox-group{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.cb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;transition:all .15s}
.cb-item:hover{background:var(--surf2)}
.cb-item.selected{border-color:var(--blue);background:var(--blue-bg)}
.cb-item input[type=checkbox]{width:auto;margin:0}
.cb-label{font-size:13px;flex:1}
.cb-sub{font-size:11px;color:var(--tx3)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:600;color:var(--tx3);padding:7px 10px;border-bottom:.5px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:9px 10px;border-bottom:.5px solid var(--bd);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surf2)}

/* NOTICE */
.notice{border-radius:var(--r);padding:.875rem 1rem;font-size:13px;line-height:1.6}
.n-warn{background:var(--amber-bg);color:var(--amber-tx);border-left:3px solid #ef9f27}
.n-info{background:var(--blue-bg);color:var(--blue-tx);border-left:3px solid var(--blue)}
.n-red{background:var(--red-bg);color:var(--red-tx);border-left:3px solid #e24b4a}
.n-green{background:var(--green-bg);color:var(--green-tx);border-left:3px solid #639922}
.n-purple{background:var(--purple-bg);color:var(--purple-tx);border-left:3px solid var(--purple)}

/* BAR */
.bar-wrap{display:flex;flex-direction:column;gap:8px}
.bar-row{display:grid;grid-template-columns:100px 1fr 44px;gap:8px;align-items:center}
.bar-lbl{font-size:12px;color:var(--tx2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{background:var(--surf2);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-val{font-size:12px;font-weight:600;font-family:var(--mono)}

/* HOTSPOT */
.hs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.hs-card{border-radius:var(--r);padding:1rem;text-align:center;border:.5px solid var(--bd);background:var(--surf)}
.hs-icon{font-size:22px;margin-bottom:5px}
.hs-name{font-size:11px;font-weight:600;margin-bottom:3px}
.hs-count{font-size:22px;font-weight:700;line-height:1}
.hs-bar{height:4px;border-radius:2px;margin:5px 0 3px}

/* TECH CARD */
.tech-card{display:flex;align-items:center;gap:12px;padding:.875rem;border:.5px solid var(--bd);border-radius:var(--r);background:var(--surf);margin-bottom:.5rem}
.tech-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.tech-info{flex:1}
.tech-name{font-size:13px;font-weight:600}
.wl-track{background:var(--surf2);border-radius:3px;height:5px;margin-top:7px}
.wl-fill{height:100%;border-radius:3px;transition:width .5s}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surf);border-radius:var(--rl);padding:1.5rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center}
.mc{background:none;border:none;font-size:20px;cursor:pointer;color:var(--tx3);line-height:1}

/* MISC */
.divider{border:none;border-top:.5px solid var(--bd);margin:1rem 0}
.mono{font-family:var(--mono);font-size:12px}
.empty{text-align:center;padding:2.5rem;color:var(--tx3);font-size:13px}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.875rem}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:.5px solid var(--bd2);cursor:pointer;background:transparent;color:var(--tx2);font-family:var(--font);transition:all .15s}
.pill.on{background:#0f1a2e;color:#fff;border-color:#0f1a2e}

/* LOADER */
.loader-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--surf3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#0f1a2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:600;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:none}

/* ASSIGN AVATARS */
.assignees-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.av-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:500}

/* CONFIG BOX */
.config-box{background:var(--surf3);border-radius:var(--r);padding:1rem;font-size:12px;font-family:var(--mono);color:var(--tx2);line-height:1.7}
.config-box input{font-family:var(--mono);font-size:12px;margin-top:4px}

@media(max-width:640px){
  .g2,.g3,.g4,.hs-grid,.frow{grid-template-columns:1fr}
  .bar-row{grid-template-columns:80px 1fr 36px}
  .nav-logo small{display:none}
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--tx2)" id="loaderMsg">กำลังโหลดข้อมูล...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">คณะสัตวแพทยศาสตร์ ม.อ.<small>ระบบแจ้งซ่อมออนไลน์ v3</small></div>
  <button class="ntab on" onclick="gp('report')">แจ้งซ่อม</button>
  <button class="ntab" onclick="gp('status')">ติดตามงาน</button>
  <button class="ntab" onclick="gp('qr')">QR Code</button>
  <button class="ntab" id="nt-approve" style="display:none" onclick="gp('approve')">
    อนุมัติ <span id="apv-cnt" style="background:rgba(226,75,74,.3);color:#f09595;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:2px">0</span>
  </button>
  <button class="ntab" id="nt-manage" style="display:none" onclick="gp('manage')">จัดการงาน</button>
  <button class="ntab" id="nt-dash" style="display:none" onclick="gp('dashboard')">Dashboard</button>
  <button class="ntab" id="nt-cfg" style="display:none" onclick="gp('config')">⚙ ตั้งค่า</button>
  <div class="nav-r">
    <span class="ubadge" id="ubadge" style="display:none"></span>
    <button class="nbtn" id="lbtn" onclick="oLogin()">เข้าสู่ระบบ</button>
    <button class="nbtn" id="lobtn" style="display:none" onclick="doOut()">ออก</button>
  </div>
</nav>

<!-- MAIN -->
<div id="pg" class="pg"></div>

<!-- MODALS -->
<div class="modal-bg" id="loginMd" style="display:none">
  <div class="modal" style="max-width:380px">
    <div class="modal-title">เข้าสู่ระบบ <button class="mc" onclick="cm('loginMd')">✕</button></div>
    <div class="ff"><label>ชื่อผู้ใช้</label><input id="lu" placeholder="username" autocomplete="username"></div>
    <div class="ff"><label>รหัสผ่าน</label><input id="lp" type="password" placeholder="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doIn()"></div>

    <div id="lerr" style="color:var(--red-tx);font-size:12px;margin-bottom:.5rem;display:none"></div>
    <button class="btn btn-p" style="width:100%" onclick="doIn()">เข้าสู่ระบบ</button>
  </div>
</div>
<div class="modal-bg" id="detMd" style="display:none"><div class="modal" id="detContent"></div></div>
<div class="modal-bg" id="assignMd" style="display:none"><div class="modal" id="assignContent"></div></div>
<div class="modal-bg" id="statusMd" style="display:none"><div class="modal" id="statusContent"></div></div>

<script>
// ═══════════════════════════════════════════
// CONFIG — แก้ GAS_URL หลัง Deploy Apps Script
// ═══════════════════════════════════════════
let GAS_URL = localStorage.getItem('gas_url') || '';

const USERS = {
  admin: { pass:'admin1234', name:'นายปณิธาน แก้วเจริญ', role:'admin', color:'#7ecbb4', initials:'ปณ' },
  tech1: { pass:'tech1234',  name:'นายธนกร ไกรดิษฐ์',   role:'admin', color:'#b5d4f4', initials:'ธก', specialty:['ระบบไฟฟ้า','ระบบสื่อสาร/เครือข่าย IT'] },
  tech2: { pass:'tech2234',  name:'นายเอกรัตน์ อุปถัมภ์', role:'admin', color:'#f5c4b3', initials:'อร', specialty:['ระบบประปา/สุขาภิบาล','ระบบปรับอากาศ'] },
};
const BUILDINGS = [
  {id:'b1',name:'อาคารจุฬาภรณการุณยรักษ์',icon:'🏢',short:'จุฬาภร',budget:120000},
  {id:'b2',name:'อาคารสหเวชศาสตร์',        icon:'🏛',short:'สหเวช',budget:80000},
  {id:'b3',name:'โรงพยาบาลปศุสัตว์',       icon:'🏥',short:'โรงพยาบาล',budget:200000},
  {id:'b4',name:'อาคารวิจัยสัตวน้ำและสัตว์ปีก',icon:'🔬',short:'วิจัย',budget:100000},
];
const CATS = ['ระบบไฟฟ้า','ระบบประปา/สุขาภิบาล','ระบบปรับอากาศ','งานโครงสร้างอาคาร','ระบบสื่อสาร/เครือข่าย IT','งานครุภัณฑ์/เฟอร์นิเจอร์','อื่นๆ'];
const STATUSES = [
  {id:'pending_approval',label:'รอวิศวกรอนุมัติ',   cls:'b-amber'},
  {id:'assigned',        label:'มอบหมายแล้ว',       cls:'b-purple'},
  {id:'survey',          label:'กำลังสำรวจหน้างาน', cls:'b-amber'},
  {id:'purchase',        label:'อยู่ระหว่างจัดซื้อ', cls:'b-purple'},
  {id:'working',         label:'กำลังดำเนินการซ่อม', cls:'b-blue'},
  {id:'done',            label:'เสร็จเรียบร้อย',     cls:'b-green'},
  {id:'cannot',          label:'ซ่อมไม่ได้',         cls:'b-red'},
];
const SLA = {'ระบบไฟฟ้า':5,'ระบบประปา/สุขาภิบาล':5,'ระบบปรับอากาศ':7,'งานโครงสร้างอาคาร':30,'ระบบสื่อสาร/เครือข่าย IT':7,'งานครุภัณฑ์/เฟอร์นิเจอร์':14,'อื่นๆ':14};

// ─── STATE ───
let cu = null, curPage = 'report';
let DB = { tickets: [], history: {} }; // local cache

// ─── API ───
async function api(action, body={}) {
  if (!GAS_URL) throw new Error('ยังไม่ได้ตั้งค่า URL ของ Apps Script');
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action, ...body })
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API error');
  return json.data;
}

async function loadAll() {
  showLoader('กำลังโหลดข้อมูลจาก Google Sheet...');
  try {
    const d = await api('getAll');
    DB.tickets = d.tickets || [];
    DB.history = d.history || {};
    // merge history into tickets
    DB.tickets.forEach(t => { t.history = DB.history[t.id] || []; });
    updApvCnt();
  } catch(e) {
    console.warn('API unavailable, using localStorage:', e.message);
    // fallback: use localStorage
    try { DB.tickets = JSON.parse(localStorage.getItem('vr3_t')||'[]'); } catch{}
    DB.tickets.forEach(t => { if(!t.history) t.history=[]; if(!t.assignees) t.assignees=[]; });
  }
  hideLoader();
}

function saveLocal() {
  localStorage.setItem('vr3_t', JSON.stringify(DB.tickets));
}

async function syncAdd(ticket) {
  if (GAS_URL) {
    try {
      await api('add', { ticket });
      await api('addHistory', { ticketId: ticket.id, entry: ticket.history[0] });
    } catch(e) { showToast('⚠ บันทึก Sheet ไม่สำเร็จ: ' + e.message, 3000); }
  }
  saveLocal();
}

async function syncUpdate(id, fields, histEntry) {
  if (GAS_URL) {
    try {
      await api('update', { id, fields });
      if (histEntry) await api('addHistory', { ticketId: id, entry: histEntry });
    } catch(e) { showToast('⚠ อัปเดต Sheet ไม่สำเร็จ: ' + e.message, 3000); }
  }
  saveLocal();
}

// ─── HELPERS ───
function genId() { return 'REP-'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,4).toUpperCase(); }
function now() { return new Date().toISOString(); }
function fd(iso) { if(!iso) return '-'; return new Date(iso).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function getSI(id) { return STATUSES.find(s=>s.id===id)||STATUSES[0]; }
function getBI(id) { return BUILDINGS.find(b=>b.id===id)||BUILDINGS[0]; }
function elapsed(iso) { return Math.floor((Date.now()-new Date(iso))/86400000); }
function getSLA(cat) { return SLA[cat]||14; }
function getUserColor(u) { return USERS[u]?.color||'#ccc'; }
function getUserInitials(u) { return USERS[u]?.initials||'?'; }
function getUserName(u) { return USERS[u]?.name||u||'—'; }

function assigneeChips(assignees) {
  if (!assignees || !assignees.length) return '<span style="color:var(--tx3);font-size:12px">ยังไม่มอบหมาย</span>';
  return assignees.map(u => {
    const usr = USERS[u];
    if (!usr) return '';
    return `<span class="av-chip" style="background:${usr.color}22;color:${usr.color}">${usr.initials} ${usr.name.split(' ')[0]}</span>`;
  }).join('');
}

function suggestAssignees(cat) {
  const active = DB.tickets.filter(t=>!['done','cannot'].includes(t.status));
  return Object.entries(USERS)
    .map(([u,v]) => {
      const wl = active.filter(t=>(t.assignees||[]).includes(u)).length;
      const sp = v.specialty||[];
      const match = sp.some(s=>cat.includes(s.replace('งาน',''))||s.includes(cat.replace('งาน','')))?0:2;
      return { u, score: wl+match, wl };
    })
    .sort((a,b)=>a.score-b.score)
    .map(x=>x.u);
}

// ─── UI HELPERS ───
function showLoader(msg='') { document.getElementById('loader').style.display='flex'; document.getElementById('loaderMsg').textContent=msg||'กำลังโหลด...'; }
function hideLoader() { document.getElementById('loader').style.display='none'; }
let toastTimer;
function showToast(msg, ms=2500) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}
function cm(id) { document.getElementById(id).style.display='none'; }
window.addEventListener('click', e => {
  ['loginMd','detMd','assignMd','statusMd'].forEach(id=>{ const el=document.getElementById(id); if(el&&e.target===el) el.style.display='none'; });
});
function updApvCnt() { const c=DB.tickets.filter(t=>t.status==='pending_approval').length; const el=document.getElementById('apv-cnt'); if(el) el.textContent=c; }

// ─── AUTH ───
function doIn() {
  const u=document.getElementById('lu').value.trim(), p=document.getElementById('lp').value;
  const err=document.getElementById('lerr');
  if (USERS[u]&&USERS[u].pass===p) { cu={username:u,...USERS[u]}; cm('loginMd'); updAuthUI(); rp(); }
  else { err.style.display='block'; err.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; }
}
function doOut() { cu=null; updAuthUI(); gp('report'); }
function oLogin() { document.getElementById('loginMd').style.display='flex'; }
function updAuthUI() {
  const b=document.getElementById('ubadge');
  document.getElementById('lbtn').style.display=cu?'none':'';
  document.getElementById('lobtn').style.display=cu?'':'none';
  ['nt-approve','nt-manage','nt-dash','nt-cfg'].forEach(id=>document.getElementById(id).style.display='none');
  if (cu) {
    b.style.display='inline-block'; b.textContent=cu.name;
    b.className='ubadge '+(cu.role==='admin'?'ua':'ut');
    // ทุกคน role=admin เห็นทุกเมนู
    document.getElementById('nt-approve').style.display='';
    document.getElementById('nt-manage').style.display='';
    document.getElementById('nt-dash').style.display='';
    document.getElementById('nt-cfg').style.display='';
    updApvCnt();
  } else { b.style.display='none'; }
}

// ─── ROUTER ───
function gp(p) {
  if (['approve','manage','dashboard','config'].includes(p) && !cu) { oLogin(); return; }
  curPage=p;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  const map={report:0,status:1,qr:2,approve:3,manage:4,dashboard:5,config:6};
  document.querySelectorAll('.ntab')[map[p]]?.classList.add('on');
  rp();
}
function rp() {
  const c=document.getElementById('pg');
  if(curPage==='report')    c.innerHTML=pgReport();
  else if(curPage==='status')    c.innerHTML=pgStatus();
  else if(curPage==='qr')        c.innerHTML=pgQR();
  else if(curPage==='approve')   c.innerHTML=pgApprove();
  else if(curPage==='manage')    c.innerHTML=pgManage();
  else if(curPage==='dashboard') c.innerHTML=pgDashboard();
  else if(curPage==='config')    c.innerHTML=pgConfig();
  if(curPage==='qr') setTimeout(renderQRs,100);
}

async function submitR() {
  const n=v('fN'),ph=v('fP'),d=v('fD'),b=v('fB'),r=v('fR'),c=v('fC'),desc=v('fDesc');
  const msg=document.getElementById('rmsg');
  if (!n||!ph||!d||!b||!r||!c||!desc) { msg.innerHTML='<div class="notice n-red" style="margin:0">กรุณากรอกข้อมูลที่จำเป็นให้ครบ (*)</div>'; return; }
  const ticket = {
    id:genId(), createdAt:now(), name:n, phone:ph, dept:d,
    email:v('fE'), building:b, room:r, category:c,
    priority:v('fPr'), estimatedCost:parseFloat(v('fCost'))||0,
    actualCost:0, desc, status:'pending_approval',
    assignees:[], approvedAt:null, approvedBy:null, approvedBudget:0,
    history:[{status:'pending_approval',date:now(),note:'รับแจ้งซ่อมเข้าระบบ',by:'ระบบ'}]
  };
  DB.tickets.push(ticket);
  showLoader('กำลังบันทึก...');
  await syncAdd(ticket);
  hideLoader(); updApvCnt();
  msg.innerHTML=`<div class="notice n-green" style="margin:0"><b>✅ ส่งแจ้งซ่อมสำเร็จ!</b><br>รหัส: <span class="mono">${ticket.id}</span><br>สถานะ: รอวิศวกรตรวจสอบและอนุมัติ</div>`;
  ['fN','fP','fD','fE','fR','fDesc','fCost'].forEach(f=>{const el=document.getElementById(f);if(el)el.value='';});
  document.getElementById('fB').value=''; document.getElementById('fC').value='';
  showToast('✅ บันทึกลง Google Sheet แล้ว');
}
function v(id) { const el=document.getElementById(id); return el?el.value.trim():''; }

// ════════════════════════ PAGE: STATUS ════════════════════════
function pgStatus() {
  const tickets=DB.tickets.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return `<div>
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="sq" placeholder="ค้นหารหัส / ชื่อ / อาคาร..." style="max-width:280px" oninput="filterStatus()">
        <select id="sbld" onchange="filterStatus()" style="width:auto">
          <option value="">ทุกอาคาร</option>${BUILDINGS.map(b=>`<option value="${b.id}">${b.short}</option>`).join('')}
        </select>
        <select id="ssta" onchange="filterStatus()" style="width:auto">
          <option value="">ทุกสถานะ</option>${STATUSES.map(s=>`<option value="${s.id}">${s.label}</option>`).join('')}
        </select>
        <button class="btn btn-sm" onclick="loadAll().then(rp)" style="margin-left:auto">🔄 รีเฟรช</button>
      </div>
    </div>
    <div id="stlist">${renderStatusList(tickets)}</div>
  </div>`;
}
function renderStatusList(tickets) {
  if (!tickets.length) return `<div class="empty">ไม่พบรายการ</div>`;
  return `<div style="display:flex;flex-direction:column;gap:.5rem">${tickets.map(t=>{
    const s=getSI(t.status),b=getBI(t.building);
    const pCls=t.priority==='high'?'b-red':t.priority==='med'?'b-amber':'b-gray';
    const pLbl={high:'เร่งด่วน',med:'ปานกลาง',low:'ปกติ'}[t.priority];
    const el=elapsed(t.createdAt),sla=getSLA(t.category),over=el>sla&&!['done','cannot'].includes(t.status);
    return `<div class="card card-sm" style="${over?'border-left:3px solid #e24b4a':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
        <div style="flex:1">
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px">
            <span class="mono">${t.id}</span>
            <span class="badge ${s.cls}">${s.label}</span>
            <span class="badge ${pCls}">${pLbl}</span>
            ${over?'<span class="badge b-red">⚠ เกิน SLA</span>':''}
          </div>
          <div style="font-weight:600;font-size:13px;margin-bottom:2px">${b.icon} ${b.name} — ${t.room}</div>
          <div style="font-size:12px;color:var(--tx2)">${t.category} | ${t.name} | ${fd(t.createdAt)}</div>
          <div style="font-size:12px;margin-top:4px">${assigneeChips(t.assignees)}</div>
        </div>
        <button class="btn btn-sm" onclick="openDet('${t.id}')">รายละเอียด</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}
function filterStatus() {
  const q=(v('sq')||'').toLowerCase(),bl=v('sbld')||'',st2=v('ssta')||'';
  let t=DB.tickets.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(q) t=t.filter(x=>x.id.toLowerCase().includes(q)||x.name.toLowerCase().includes(q)||getBI(x.building).name.toLowerCase().includes(q));
  if(bl) t=t.filter(x=>x.building===bl);
  if(st2) t=t.filter(x=>x.status===st2);
  document.getElementById('stlist').innerHTML=renderStatusList(t);
}

// ════════════════════════ PAGE: QR ════════════════════════
function pgQR() {
  return `<div style="max-width:780px;margin:0 auto">
    <div class="notice n-info" style="margin-bottom:1rem">QR Code สำหรับติดป้ายตามอาคาร — สแกนเพื่อเข้าแบบฟอร์มแจ้งซ่อม</div>
    <div class="g2">${BUILDINGS.map(b=>`
    <div class="card" style="text-align:center">
      <div style="font-size:24px;margin-bottom:4px">${b.icon}</div>
      <div style="font-weight:600;margin-bottom:.75rem;font-size:13px">${b.name}</div>
      <div id="qr-${b.id}" style="display:flex;justify-content:center;margin-bottom:.75rem"></div>
      <button class="btn btn-sm" style="margin:0 auto" onclick="pQR('${b.id}','${b.name}')">🖨 พิมพ์ QR</button>
    </div>`).join('')}</div>
  </div>`;
}
function renderQRs() {
  if (typeof QRCode==='undefined') return;
  BUILDINGS.forEach(b=>{
    const el=document.getElementById('qr-'+b.id);
    if(el){el.innerHTML='';new QRCode(el,{text:window.location.href+'?b='+b.id,width:140,height:140,colorDark:'#0f1a2e',colorLight:'#fff'});}
  });
}
function pQR(id,name) {
  const el=document.getElementById('qr-'+id),c=el?.querySelector('canvas');if(!c)return;
  const w=window.open('','_blank');
  w.document.write(`<html><body style="text-align:center;font-family:sans-serif;padding:30px"><h2>แจ้งซ่อม — คณะสัตวแพทยศาสตร์ ม.อ.</h2><h3>${name}</h3><img src="${c.toDataURL()}" style="width:180px;margin:16px 0"><p>สแกน QR เพื่อแจ้งซ่อม</p><script>window.print();window.close();<\/script></body></html>`);
}

  const pending=DB.tickets.filter(t=>t.status==='pending_approval').sort((a,b)=>{
    if(a.priority==='high'&&b.priority!=='high') return -1;
    if(b.priority==='high'&&a.priority!=='high') return 1;
    return new Date(a.createdAt)-new Date(b.createdAt);
  });
  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div><div style="font-size:16px;font-weight:700">คิวรออนุมัติ</div>
      <div style="font-size:12px;color:var(--tx3)">${pending.length} รายการ</div></div>
      <button class="btn btn-sm" onclick="loadAll().then(rp)">🔄 รีเฟรช</button>
    </div>
    ${!pending.length?`<div class="notice n-green">✓ ไม่มีงานรออนุมัติในขณะนี้</div>`:''}
    <div style="display:flex;flex-direction:column;gap:.75rem">
    ${pending.map(t=>{
      const b=getBI(t.building),pCls=t.priority==='high'?'b-red':t.priority==='med'?'b-amber':'b-gray';
      const pLbl={high:'เร่งด่วน',med:'ปานกลาง',low:'ปกติ'}[t.priority];
      const suggested=suggestAssignees(t.category);
      return `<div class="card card-sm" style="${t.priority==='high'?'border-left:3px solid #e24b4a':'border-left:3px solid #185fa5'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem">
          <div style="flex:1">
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">
              <span class="mono">${t.id}</span><span class="badge ${pCls}">${pLbl}</span>
            </div>
            <div style="font-weight:600;margin-bottom:3px">${b.icon} ${b.name} — ${t.room}</div>
            <div style="font-size:12px;color:var(--tx2)">${t.category} | ผู้แจ้ง: ${t.name} (${t.dept})</div>
            <div style="font-size:12px;color:var(--tx2);margin:2px 0">${t.desc.substring(0,90)}${t.desc.length>90?'...':''}</div>
            ${t.estimatedCost?`<div style="font-size:12px">ประมาณการ: <b>${t.estimatedCost.toLocaleString()} บาท</b></div>`:''}
            <div style="font-size:12px;background:var(--teal-bg);color:var(--teal-tx);padding:4px 8px;border-radius:6px;margin-top:6px;display:inline-block">
              ระบบแนะนำ: <b>${suggested.map(u=>getUserName(u).split(' ')[0]).join(', ')}</b>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:5px">
            <button class="btn btn-sm btn-green" onclick="openAssign('${t.id}')">✓ อนุมัติ + มอบหมาย</button>
            <button class="btn btn-sm" onclick="openDet('${t.id}')">ดูรายละเอียด</button>
            <button class="btn btn-sm btn-red" onclick="doReject('${t.id}')">✕ ส่งกลับ</button>
          </div>
        </div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

function openAssign(id) {
  const t=DB.tickets.find(t=>t.id===id); if(!t) return;
  const suggested=suggestAssignees(t.category);
  const active=DB.tickets.filter(x=>!['done','cannot'].includes(x.status));
  const techList=Object.entries(USERS).map(([u,usr])=>{
    const wl=active.filter(x=>(x.assignees||[]).includes(u)).length;
    const isSugg=suggested.indexOf(u);
    const sugg=isSugg===0?'⭐ แนะนำ':isSugg===1?'✓ รอง':'';
    return `<div class="cb-item ${(t.assignees||[]).includes(u)?'selected':''}" onclick="toggleCb(this,'${u}')">
      <input type="checkbox" id="cb_${u}" ${(t.assignees||[]).includes(u)?'checked':''} style="pointer-events:none">
      <div class="tech-av" style="background:${usr.color}22;color:${usr.color};width:28px;height:28px;font-size:11px">${usr.initials}</div>
      <div class="cb-label"><b>${usr.name}</b>${sugg?` <span class="badge b-teal" style="font-size:10px">${sugg}</span>`:''}</div>
      <div class="cb-sub">งานคงค้าง: ${wl}</div>
    </div>`;
  }).join('');
  document.getElementById('assignContent').innerHTML=`
    <div class="modal-title">อนุมัติและมอบหมายงาน <button class="mc" onclick="cm('assignMd')">✕</button></div>
    <div style="background:var(--surf2);border-radius:8px;padding:.75rem;margin-bottom:1rem;font-size:13px">
      <b>${getBI(t.building).name}</b> — ${t.room}<br><span style="color:var(--tx2)">${t.category}</span>
    </div>
    <div class="ff">
      <label>เลือกผู้รับผิดชอบ (เลือกได้ 1–3 คน ทำงานพร้อมกันได้)</label>
      <div class="checkbox-group" id="assignees-group">${techList}</div>
    </div>
    <div class="ff"><label>หมายเหตุจากผู้อนุมัติ</label><textarea id="asNote" placeholder="คำแนะนำสำหรับช่าง..."></textarea></div>
    <div class="ff"><label>งบประมาณที่อนุมัติ (บาท)</label><input id="asBudget" type="number" value="${t.estimatedCost||0}"></div>
    <button class="btn btn-p" style="width:100%" onclick="confirmAssign('${id}')">ยืนยันอนุมัติและมอบหมาย</button>`;
  document.getElementById('assignMd').style.display='flex';
}

function toggleCb(el, u) {
  el.classList.toggle('selected');
  const cb=document.getElementById('cb_'+u);
  if(cb) cb.checked=!cb.checked;
}

async function confirmAssign(id) {
  const selected=[...document.querySelectorAll('#assignees-group .cb-item.selected')].map(el=>{
    const cb=el.querySelector('input[type=checkbox]'); return cb?.id.replace('cb_','');
  }).filter(Boolean);
  if(!selected.length){alert('กรุณาเลือกผู้รับผิดชอบอย่างน้อย 1 คน');return;}
  const note=v('asNote'),budget=parseFloat(document.getElementById('asBudget').value)||0;
  const t=DB.tickets.find(t=>t.id===id);if(!t)return;
  t.status='assigned'; t.assignees=selected; t.approvedAt=now(); t.approvedBy=cu.username; t.approvedBudget=budget;
  const entry={status:'assigned',date:now(),note:`อนุมัติโดย ${cu.name} → มอบหมาย: ${selected.map(getUserName).join(', ')}${note?' — '+note:''}`,by:cu.name};
  if(!t.history)t.history=[];
  t.history.push(entry);
  showLoader('กำลังบันทึก...');
  await syncUpdate(id,{status:'assigned',assignees:selected,approvedAt:t.approvedAt,approvedBy:t.approvedBy,approvedBudget:budget},entry);
  hideLoader(); cm('assignMd'); updApvCnt(); rp();
  showToast(`✅ มอบหมายงานให้ ${selected.map(u=>getUserName(u).split(' ')[0]).join(' + ')} แล้ว`);
}

async function doReject(id) {
  const reason=prompt('เหตุผลที่ส่งกลับ:'); if(reason===null) return;
  const t=DB.tickets.find(t=>t.id===id);if(!t)return;
  t.status='cannot';
  const entry={status:'cannot',date:now(),note:'ส่งกลับ: '+reason,by:cu.name};
  if(!t.history)t.history=[];
  t.history.push(entry);
  showLoader('กำลังบันทึก...');
  await syncUpdate(id,{status:'cannot'},entry);
  hideLoader(); updApvCnt(); rp();
}

  // ทุกคน role=admin เห็นทั้งหมด
  let tickets=DB.tickets.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const active=tickets.filter(t=>!['done','cannot','pending_approval'].includes(t.status));
  const done=tickets.filter(t=>['done','cannot'].includes(t.status));
  return `<div>
    <div class="notice n-info" style="margin-bottom:1rem;font-size:12px">
      ผู้ใช้: <b>${cu.name}</b> — เห็นและจัดการงานได้ทุกรายการ
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <div style="font-size:13px;font-weight:600">กำลังดำเนินการ (${active.length})</div>
      <button class="btn btn-sm" onclick="loadAll().then(rp)">🔄 รีเฟรช</button>

function openStatusUpdate(id) {
  const t=DB.tickets.find(t=>t.id===id);if(!t)return;
  const avail=STATUSES.filter(s=>!['pending_approval'].includes(s.id));
  document.getElementById('statusContent').innerHTML=`
    <div class="modal-title">อัปเดตสถานะ <button class="mc" onclick="cm('statusMd')">✕</button></div>
    <div style="background:var(--surf2);padding:.75rem;border-radius:8px;margin-bottom:1rem;font-size:13px">
      <b>${getBI(t.building).name}</b> — ${t.room}<br>${t.category}
    </div>
    <div class="ff"><label>สถานะใหม่</label>
      <select id="updSt">${avail.map(s=>`<option value="${s.id}" ${t.status===s.id?'selected':''}>${s.label}</option>`).join('')}</select>
    </div>
    <div class="ff"><label>ค่าใช้จ่ายจริง (บาท)</label><input id="updCost" type="number" value="${t.actualCost||0}"></div>
    <div class="ff"><label>หมายเหตุ</label><textarea id="updNote" placeholder="รายละเอียดการดำเนินงาน..."></textarea></div>
    <button class="btn btn-p" style="width:100%" onclick="saveStatusUpdate('${id}')">บันทึก</button>`;
  document.getElementById('statusMd').style.display='flex';
}

async function saveStatusUpdate(id) {
  const ns=document.getElementById('updSt').value;
  const note=v('updNote'), cost=parseFloat(document.getElementById('updCost').value)||0;
  const t=DB.tickets.find(t=>t.id===id);if(!t)return;
  t.status=ns; t.actualCost=cost;
  if(ns==='done') t.completedAt=now();
  const entry={status:ns,date:now(),note:note||'-',by:cu.name};
  if(!t.history)t.history=[];
  t.history.push(entry);
  showLoader('กำลังบันทึก...');
  await syncUpdate(id,{status:ns,actualCost:cost,...(ns==='done'?{completedAt:t.completedAt}:{})},entry);
  hideLoader(); cm('statusMd'); rp();
  showToast('✅ อัปเดตสถานะแล้ว');
}

// ════════════════════════ PAGE: DASHBOARD ════════════════════════
function pgDashboard() {
  if (!cu) return `<div class="empty">กรุณาเข้าสู่ระบบ</div>`;
  const tickets=DB.tickets;
  const active=tickets.filter(t=>!['done','cannot'].includes(t.status));
  const done=tickets.filter(t=>t.status==='done');
  const pending=tickets.filter(t=>t.status==='pending_approval');
  const overSLA=active.filter(t=>elapsed(t.createdAt)>getSLA(t.category));
  const budgetData=BUILDINGS.map(b=>{
    const bt=tickets.filter(t=>t.building===b.id);
    const spent=bt.reduce((s,t)=>s+(t.actualCost||0),0);
    return{...b,spent,pct:Math.min(100,Math.round(spent/b.budget*100))};
  });
  const totalBudget=BUILDINGS.reduce((s,b)=>s+b.budget,0);
  const totalSpent=budgetData.reduce((s,b)=>s+b.spent,0);
  const hotspot=BUILDINGS.map(b=>({...b,count:tickets.filter(t=>t.building===b.id).length,active:tickets.filter(t=>t.building===b.id&&!['done','cannot'].includes(t.status)).length}));
  const maxHs=Math.max(...hotspot.map(h=>h.count),1);
  const techLoad=Object.entries(USERS).map(([u,v2])=>{
    const tw=tickets.filter(t=>(t.assignees||[]).includes(u));
    return{u,v:v2,active:tw.filter(t=>!['done','cannot'].includes(t.status)).length,done:tw.filter(t=>t.status==='done').length,overSla:tw.filter(t=>!['done','cannot'].includes(t.status)&&elapsed(t.createdAt)>getSLA(t.category)).length};
  });
  const maxLoad=Math.max(...techLoad.map(t=>t.active),1);
  const catData=CATS.map(c=>({name:c,count:tickets.filter(t=>t.category===c).length})).sort((a,b)=>b.count-a.count);
  const maxCat=Math.max(...catData.map(c=>c.count),1);
  const recurring=[];
  BUILDINGS.forEach(b=>{CATS.forEach(c=>{const cnt=tickets.filter(t=>t.building===b.id&&t.category===c).length;if(cnt>=2)recurring.push({building:b,cat:c,count:cnt});});});
  recurring.sort((a,b)=>b.count-a.count);

  return `<div>
    <div class="g4" style="margin-bottom:1rem">
      <div class="stat"><div class="stat-lbl">งานทั้งหมด</div><div class="stat-n">${tickets.length}</div></div>
      <div class="stat"><div class="stat-lbl">กำลังดำเนินการ</div><div class="stat-n" style="color:var(--blue)">${active.length}</div><div class="stat-sub">รออนุมัติ ${pending.length}</div></div>
      <div class="stat"><div class="stat-lbl">เสร็จสิ้น</div><div class="stat-n" style="color:var(--green)">${done.length}</div><div class="stat-sub">${tickets.length?Math.round(done.length/tickets.length*100):0}%</div></div>
      <div class="stat"><div class="stat-lbl">เกิน SLA</div><div class="stat-n" style="color:var(--red)">${overSLA.length}</div></div>
    </div>
    <div class="g2" style="margin-bottom:1rem">
      <div class="card">
        <div class="ctitle">💰 งบประมาณรายอาคาร</div>
        <div class="stat" style="margin-bottom:.75rem">
          <div class="stat-lbl">ใช้จ่ายรวม</div>
          <div class="stat-n">${totalSpent.toLocaleString()} <span style="font-size:14px;font-weight:400;color:var(--tx2)">/ ${totalBudget.toLocaleString()} บาท</span></div>
          <div style="height:6px;background:var(--surf3);border-radius:3px;margin-top:8px">
            <div style="height:100%;border-radius:3px;background:${totalSpent/totalBudget>.8?'#e24b4a':'#3b6d11'};width:${Math.min(100,Math.round(totalSpent/totalBudget*100))}%"></div>
          </div>
        </div>
        <div class="bar-wrap">${budgetData.map(b=>`<div class="bar-row">
          <div class="bar-lbl">${b.icon} ${b.short}</div>
          <div><div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${b.pct>80?'#e24b4a':b.pct>50?'#ef9f27':'#3b6d11'}"></div></div>
          <div style="font-size:10px;color:var(--tx3);margin-top:2px">${b.spent.toLocaleString()} / ${b.budget.toLocaleString()} บาท</div></div>
          <div class="bar-val">${b.pct}%</div>
        </div>`).join('')}</div>
      </div>
      <div class="card">
        <div class="ctitle">🔥 Hotspot รายอาคาร</div>
        <div class="hs-grid" style="margin-bottom:.75rem">${hotspot.map(h=>{
          const pct=Math.round(h.count/maxHs*100),col=pct>75?'#e24b4a':pct>50?'#ef9f27':pct>25?'#185fa5':'#3b6d11';
          return `<div class="hs-card"><div class="hs-icon">${h.icon}</div><div class="hs-name">${h.short}</div>
            <div class="hs-count" style="color:${col}">${h.count}</div>
            <div class="hs-bar" style="background:${col}33"><div style="height:100%;border-radius:2px;background:${col};width:${pct}%"></div></div>
            <div style="font-size:11px;color:var(--tx3)">คงค้าง ${h.active}</div></div>`;
        }).join('')}</div>
        ${recurring.length?`<div style="font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px">ปัญหาซ้ำซาก</div>${recurring.slice(0,3).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--bd);font-size:12px"><span>${r.building.icon} ${r.building.short} — ${r.cat}</span><span class="badge b-red">${r.count} ครั้ง</span></div>`).join('')}`:''}
      </div>
    </div>
    <div class="g2">
      <div class="card">
        <div class="ctitle">👷 ภาระงานแต่ละคน</div>
        ${techLoad.map(t=>{
          const pct=maxLoad?Math.round(t.active/maxLoad*100):0,wlColor=pct>80?'#e24b4a':pct>50?'#ef9f27':'#3b6d11';
          return `<div class="tech-card">
            <div class="tech-av" style="background:${t.v.color}33;color:${t.v.color}">${t.v.initials}</div>
            <div class="tech-info">
              <div class="tech-name">${t.v.name}</div>
              <div style="font-size:11px;color:var(--tx3)">${(t.v.specialty||[]).join(' · ')}</div>
              <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">
                <span class="badge b-blue">คงค้าง ${t.active}</span>
                <span class="badge b-green">เสร็จ ${t.done}</span>
                ${t.overSla?`<span class="badge b-red">เกิน SLA ${t.overSla}</span>`:''}
              </div>
              <div class="wl-track"><div class="wl-fill" style="width:${pct}%;background:${wlColor}"></div></div>
            </div>
            <div style="font-size:20px;font-weight:700;color:${wlColor};font-family:var(--mono);min-width:28px;text-align:right">${t.active}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="ctitle">📊 งานแยกตามประเภท</div>
        <div class="bar-wrap">${catData.map(c=>{const pct=Math.round(c.count/maxCat*100);return `<div class="bar-row"><div class="bar-lbl">${c.name.replace('งาน','').replace('ระบบ','')}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#185fa5"></div></div><div class="bar-val">${c.count}</div></div>`;}).join('')}</div>
        <hr class="divider" style="margin:.875rem 0">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px">ภาระงานรายอาคาร</div>
        ${hotspot.map(h=>{const ratio=tickets.length?Math.round(h.count/tickets.length*100):0,cls=ratio>35?'b-red':ratio>20?'b-amber':'b-green',msg=ratio>35?'ภาระสูง':ratio>20?'ปานกลาง':'ต่ำ';
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--bd);font-size:12px"><span>${h.icon} ${h.name}</span><span class="badge ${cls}">${ratio}% — ${msg}</span></div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function saveGasUrl() {
  GAS_URL=document.getElementById('gasUrl').value.trim();
  localStorage.setItem('gas_url',GAS_URL);
  document.getElementById('cfgMsg').innerHTML='<div class="notice n-green" style="margin:0">✅ บันทึก URL แล้ว</div>';
  showToast('✅ บันทึก URL แล้ว');
}

async function initSheet() {
  GAS_URL=document.getElementById('gasUrl').value.trim();
  localStorage.setItem('gas_url',GAS_URL);
  showLoader('กำลังสร้าง Google Sheet...');
  try {
    await api('init');
    hideLoader();
    document.getElementById('cfgMsg').innerHTML='<div class="notice n-green" style="margin:0">✅ สร้าง Sheet สำเร็จ! พร้อมใช้งานแล้ว</div>';
    showToast('✅ สร้าง Sheet สำเร็จ!');
    await loadAll();
  } catch(e) {
    hideLoader();
    document.getElementById('cfgMsg').innerHTML=`<div class="notice n-red" style="margin:0">❌ เกิดข้อผิดพลาด: ${e.message}</div>`;
  }
}

async function testConnection() {
  GAS_URL=document.getElementById('gasUrl').value.trim();
  showLoader('กำลังทดสอบ...');
  try {
    await api('getAll');
    hideLoader();
    document.getElementById('cfgMsg').innerHTML='<div class="notice n-green" style="margin:0">✅ เชื่อมต่อสำเร็จ! Google Sheet พร้อมใช้งาน</div>';
    showToast('✅ เชื่อมต่อสำเร็จ');
  } catch(e) {
    hideLoader();
    document.getElementById('cfgMsg').innerHTML=`<div class="notice n-red" style="margin:0">❌ เชื่อมต่อไม่ได้: ${e.message}</div>`;
  }
}

       ['ประมาณการ',(t.estimatedCost||0).toLocaleString()+' บาท'],
       ['ค่าใช้จ่ายจริง',(t.actualCost||0).toLocaleString()+' บาท'],
    ].map(([l,v2])=>`<tr><td style="color:var(--tx3);padding:4px 0;width:110px;font-size:12px;vertical-align:top">${l}</td><td style="padding:4px 0">${v2}</td></tr>`).join('')}

    <div style="font-size:12px;color:var(--tx3);margin-bottom:4px">รายละเอียด</div>
